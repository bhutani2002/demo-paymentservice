name: ReviewGuard PR Verification

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request Number to verify'
        required: true
        default: '14'

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          path: target-repo

      - name: Checkout ReviewGuard Agent Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/reviewguard
          token: ${{ secrets.GITHUB_TOKEN }}
          path: agent-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          cd agent-repo
          pip install .

      - name: Run ReviewGuard Agent
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual verification run' }}
          PR_BODY: ${{ github.event.pull_request.body || 'Manual trigger via workflow_dispatch' }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref || github.head_ref || 'main' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TARGET_REPO_PATH: ${{ github.workspace }}/target-repo
        run: |
          cd agent-repo
          python -m agent.agent
